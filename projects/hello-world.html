<!doctype html>
<!--
  Sample project for the hub.
  Convention for every project file:
    - one self-contained .html file (all CSS/JS inside)
    - lives in the projects/ folder
    - includes the "back to index" link below
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hello World</title>
<style>
  :root{
    --snow:#F5F7F9; --ink:#16181D; --haze:#5C6672;
    --line:#DCE1E7; --aurora:#0E8A62; --aurora-deep:#0A6B4C;
  }
  *{box-sizing:border-box;margin:0}
  body{
    font-family:system-ui,-apple-system,sans-serif;
    background:var(--snow); color:var(--ink);
    min-height:100svh; display:grid; place-items:center;
    padding:24px;
  }
  .back{
    position:fixed; top:20px; left:20px;
    font-family:ui-monospace,Menlo,monospace; font-size:13px;
    color:var(--haze); text-decoration:none;
  }
  .back:hover{color:var(--aurora-deep)}
  main{text-align:center; max-width:34ch}
  h1{font-size:clamp(36px,8vw,52px); letter-spacing:-.02em}
  p{margin-top:14px; color:var(--haze); line-height:1.5}
  button{
    margin-top:28px; font:inherit; font-size:16px;
    padding:12px 28px; border-radius:999px; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:var(--ink);
  }
  button:hover{border-color:var(--aurora)}
  button:focus-visible{outline:2px solid var(--aurora); outline-offset:2px}
  .n{color:var(--aurora-deep); font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<a class="back" href="../">&larr; index</a>
<main>
  <h1>It works.</h1>
  <p>This file lives in <code>projects/</code> and the hub found it on its own. Every project we build gets delivered as one file like this.</p>
  <button id="b">Clicked <span class="n" id="n">0</span> times</button>
</main>
<script>
  let n = 0;
  document.getElementById("b").addEventListener("click", () => {
    document.getElementById("n").textContent = ++n;
  });
</script>
</body>
</html>
